name: CI

on:
  push:
  pull_request:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run test suite against SQLite
        run: cargo test --all-targets

  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: coderag
          POSTGRES_PASSWORD: coderag
          POSTGRES_DB: coderag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coderag -d coderag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://coderag:coderag@localhost:5432/coderag

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run test suite against PostgreSQL and SQLite
        run: cargo test --all-targets
